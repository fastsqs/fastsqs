name: docs

# Validates the MkDocs build on pushes to main that touch the docs or their
# inputs. Publication lives in fastsqs/fastsqs.github.io (publish.yml, Pages
# via OIDC): the org disabled deploy keys, so this repo cannot push there.
# After a release, trigger that workflow manually or wait for its daily cron.
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'README.md'
      - 'pyproject.toml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-deploy
  cancel-in-progress: true

jobs:
  build:
    name: build docs (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for accurate edit/last-update links
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"
      - name: Build site (strict)
        run: mkdocs build --strict
